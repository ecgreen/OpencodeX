name: GUI sidecar failure
description: Report a desktop GUI startup, sidecar, or connection problem
title: "[GUI SIDECAR]: "
labels:
  - gui
  - sidecar
body:
  - type: input
    id: version
    attributes:
      label: OpencodeX GUI version
      placeholder: "1.15.13 or release tag"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Windows 11, macOS 14, Ubuntu 24.04"
    validations:
      required: true

  - type: dropdown
    id: build
    attributes:
      label: GUI build type
      options:
        - GitHub Release installer
        - GitHub Release archive
        - local electron-builder package
        - development mode
    validations:
      required: true

  - type: textarea
    id: behavior
    attributes:
      label: What happened?
      description: Describe the window state, error screen, sidecar error, or connection failure.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant logs or attach screenshots. Redact tokens, keys, paths, or usernames if needed.
    validations:
      required: false

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
