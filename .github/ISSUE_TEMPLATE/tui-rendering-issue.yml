name: TUI rendering issue
description: Report terminal rendering, layout, input, or keybinding problems
title: "[TUI]: "
labels:
  - tui
body:
  - type: input
    id: version
    attributes:
      label: OpencodeX version
      placeholder: "1.15.13 or release tag"
    validations:
      required: true

  - type: input
    id: terminal
    attributes:
      label: Terminal
      placeholder: "Windows Terminal, iTerm2, Ghostty, Alacritty, VS Code terminal"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Windows 11, macOS 14, Ubuntu 24.04"
    validations:
      required: true

  - type: dropdown
    id: problem
    attributes:
      label: Problem area
      options:
        - layout or wrapping
        - colors or theme
        - keyboard input
        - sidebar or dashboard
        - prompt composer
        - diff or transcript rendering
        - other
    validations:
      required: true

  - type: textarea
    id: behavior
    attributes:
      label: What happened?
      description: Describe what looked wrong or which keybinding/input failed.
    validations:
      required: true

  - type: textarea
    id: screenshot
    attributes:
      label: Screenshot or recording
      description: Attach a screenshot or terminal recording if possible.
    validations:
      required: false
